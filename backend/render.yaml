# Render.com deployment configuration
# Deploy for free at: https://render.com
# This deploys the FastAPI backend as a web service

services:
  # ─── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: truckergps-api
    runtime: python
    region: oregon          # Free tier available
    plan: free              # Free tier (spins down after 15min inactivity)
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: truckergps-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: truckergps-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true       # Auto-generate secure random key
      - key: ORS_API_KEY
        sync: false               # Set manually in Render dashboard
      - key: OWM_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
    healthCheckPath: /health

  # ─── Redis (for caching + WebSocket pub/sub) ──────────────────────────────────
  - type: redis
    name: truckergps-redis
    plan: free               # 25MB free tier
    maxmemoryPolicy: allkeys-lru

databases:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  - name: truckergps-db
    plan: free
    databaseName: truckergps
