name: trucker_gps
description: "Full-stack GPS navigation app for professional truck drivers - Garmin OTR class"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── Map ─────────────────────────────────────────────────────────────────────
  flutter_map: any
  latlong2: ^0.9.0
  flutter_map_location_marker: any
  flutter_map_marker_cluster: any

  # ─── GPS / Location ───────────────────────────────────────────────────────────
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # ─── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.3
  riverpod_annotation: ^2.4.3

  # ─── Networking ───────────────────────────────────────────────────────────────
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.1.0

  # ─── Local Storage ────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  sqflite: ^2.4.0

  # ─── Voice / TTS ──────────────────────────────────────────────────────────────
  flutter_tts: ^4.2.1

  # ─── UI & Charts ──────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0

  # ─── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ─── Utilities ────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.1.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

